<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Product Page</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
        <div class="logo">SleepDeprived</div>
            <ul class="nav-links">
                <li><a href="product-page.html">Products</a></li>
                <li><a href="social-page.html">Home</a></li>
            </ul>
        <div class="burger" onclick="toggleMenu()">
          <div></div>
          <div></div>
          <div></div>
        </div>
    </nav>
    
  
  <div class="product-container">
    <div class="image-section">
      <img class="main-image" src="asset/image-product-1.jpg"/>
       <div class="thumbnail-row">
        <img class ="thumbnail active" src="asset/image-product-1-thumbnail.jpg"/>
        <img class ="thumbnail" src="asset/image-product-2-thumbnail.jpg"/>
        <img class ="thumbnail" src="asset/image-product-3-thumbnail.jpg"/>
        <img class ="thumbnail" src="asset/image-product-4-thumbnail.jpg"/>
      </div>
    </div>
    <div class="info-section">
      <div class="company-name">Sleep Deprived</div>
      <div class="product-title">Fall Limited Edition Sneakers</div>
      <div class="product-description">
        These low-profile sneakers are your perfect casual wear companion. Featuring a durable rubber outer sole, they’ll withstand everything the weather can offer.
      </div>
        
    <div class="price-section">
      <div class="current-price">$125.00</div>
      <div class="discount"> 50% </div>
      <div class="old-price">$250.00</div>
    </div>
      
    <div class="quantity-cart">
      <button class="quantity-btn minus">-</button>
      <span class="quantity">0</span>
      <button class="quantity-btn plus">+</button>
    </div>

    <button class="add-to-cart-btn">
                 <i class="fa-solid fa-cart-shopping"></i>
            Add to cart
        </button> 

    </div>
  </div>
  <footer></footer>
  <script src="script.js"></script>
</body>
</html>
